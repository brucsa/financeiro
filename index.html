<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Termômetro Financeiro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #060d1a; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const MESES_SHORT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
    const DIAS_MES = [31,28,31,30,31,30,31,31,30,31,30,31];

    const CATEGORIAS = [
      { id:"salario",      label:"Salário",       emoji:"💰" },
      { id:"moradia",      label:"Moradia",       emoji:"🏠" },
      { id:"alimentacao",  label:"Alimentação",   emoji:"🛒" },
      { id:"transporte",   label:"Transporte",    emoji:"🚗" },
      { id:"saude",        label:"Saúde",         emoji:"💊" },
      { id:"lazer",        label:"Lazer",         emoji:"🎉" },
      { id:"educacao",     label:"Educação",      emoji:"📚" },
      { id:"investimento", label:"Investimento",  emoji:"📈" },
      { id:"outros",       label:"Outros",        emoji:"📌" },
    ];

    const getCatEmoji = (id) => CATEGORIAS.find(c => c.id === id)?.emoji || "📌";

    const fmt = (v) => v.toLocaleString("pt-BR", { style:"currency", currency:"BRL" });
    const fmtShort = (v) => {
      const abs = Math.abs(v);
      if (abs >= 1000) return (v < 0 ? "-" : "") + "R$" + (abs/1000).toFixed(1).replace(".",",") + "k";
      return v.toLocaleString("pt-BR", { style:"currency", currency:"BRL" });
    };

    function getStatus(performance) {
      if (performance > 5000)  return { label:"Excelente", emoji:"🔥", cor:"#22c55e", nivel:100, msg:"Suas finanças estão no verde!" };
      if (performance > 2000)  return { label:"Ótimo",     emoji:"😊", cor:"#4ade80", nivel:80,  msg:"Você está no caminho certo." };
      if (performance > 500)   return { label:"Bom",       emoji:"👍", cor:"#86efac", nivel:60,  msg:"Saldo positivo, continue assim!" };
      if (performance > 0)     return { label:"Ok",        emoji:"🙂", cor:"#bbf7d0", nivel:45,  msg:"Pequeno saldo positivo." };
      if (performance === 0)   return { label:"Neutro",    emoji:"⚖️", cor:"#fbbf24", nivel:30,  msg:"Entradas iguais às saídas." };
      if (performance > -500)  return { label:"Atenção",   emoji:"🌡️", cor:"#fed7aa", nivel:28,  msg:"Pequeno déficit este mês." };
      if (performance > -2000) return { label:"Alerta",    emoji:"⚠️", cor:"#fca5a5", nivel:22,  msg:"Fique de olho nos gastos." };
      if (performance > -5000) return { label:"Ruim",      emoji:"😟", cor:"#f87171", nivel:15,  msg:"Saídas superam as entradas." };
      return                          { label:"Crítico",   emoji:"❄️", cor:"#ef4444", nivel:5,   msg:"Déficit alto! Atenção urgente." };
    }

    function Thermo({ nivel, cor, size = 80 }) {
      const h = size * 1.8;
      const fill = (nivel / 100) * (h - 20);
      return (
        <svg width={size * 0.5} height={h} viewBox={`0 0 30 ${h}`}>
          <circle cx="15" cy={h - 8} r="10" fill="#0f172a" />
          <circle cx="15" cy={h - 8} r="7.5" fill={cor} style={{ transition:"fill 0.8s" }} />
          <rect x="11" y="6" width="8" height={h - 20} rx="4" fill="#0f172a" />
          <rect x="12.5" y={6 + (h - 20 - fill)} width="5" height={fill} rx="3" fill={cor} style={{ transition:"all 0.8s ease" }} />
          {[0,25,50,75,100].map(p => (
            <line key={p} x1="19" y1={6 + (h-20) - (p/100)*(h-20)} x2="23" y2={6 + (h-20) - (p/100)*(h-20)} stroke="#334155" strokeWidth="1" />
          ))}
        </svg>
      );
    }

    function BottomSheet({ onClose, children }) {
      return (
        <div style={{ position:"fixed", inset:0, zIndex:200, display:"flex", flexDirection:"column", justifyContent:"flex-end" }}>
          <div onClick={onClose} style={{ flex:1, background:"rgba(0,0,0,0.6)" }} />
          <div style={{ background:"#1a2540", borderRadius:"24px 24px 0 0", padding:"0 0 32px", maxHeight:"92vh", overflowY:"auto", boxShadow:"0 -8px 40px rgba(0,0,0,0.5)" }}>
            <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 4px" }}>
              <div style={{ width:36, height:4, borderRadius:2, background:"#334155" }} />
            </div>
            {children}
          </div>
        </div>
      );
    }

    function ModalLancamento({ info, lancamentoEdit, mesSel, categoriasCustom, onAddCategoria, onConfirm, onEdit, onDelete, onClose }) {
      const isEdit = !!lancamentoEdit;
      const { mes, dia } = info;

      const [tipo, setTipo]           = useState(lancamentoEdit?.tipo      || info.tipo || "saida");
      const [descricao, setDescricao] = useState(lancamentoEdit?.descricao || "");
      const [valor, setValor]         = useState(lancamentoEdit ? String(lancamentoEdit.valorParcela).replace(".", ",") : "");
      const [parcelas, setParcelas]   = useState(lancamentoEdit?.parcelas  || 1);
      const [contaFixa, setContaFixa] = useState(lancamentoEdit?.contaFixa || false);
      const [categoria, setCategoria] = useState(lancamentoEdit?.categoria || "outros");
      const [showSaveOpts, setShowSaveOpts] = useState(false);
      const [diaLanc, setDiaLanc] = useState(isEdit ? (lancamentoEdit.diaPrimeiro || dia) : dia);
      const [mesLanc, setMesLanc] = useState(mes);
      const [addingCat, setAddingCat]       = useState(false);
      const [newCatEmoji, setNewCatEmoji]   = useState("");
      const [newCatLabel, setNewCatLabel]   = useState("");

      const todasCategorias = [...CATEGORIAS, ...categoriasCustom];

      const confirmarNovaCategoria = () => {
        if (!newCatLabel.trim()) return;
        const nova = { id: "custom_" + Date.now(), label: newCatLabel.trim(), emoji: newCatEmoji.trim() || "🏷️" };
        onAddCategoria(nova);
        setCategoria(nova.id);
        setNewCatEmoji(""); setNewCatLabel(""); setAddingCat(false);
      };

      const valorNum    = parseFloat(String(valor).replace(",", ".")) || 0;
      const valorParc   = (contaFixa || isEdit) ? valorNum : (parcelas > 0 ? valorNum / parcelas : 0);
      const isRecurring = isEdit && (lancamentoEdit.contaFixa || lancamentoEdit.parcelas > 1);

      const inp = {
        background:"#0d1b2e", border:"1px solid #1e3a5f", borderRadius:12,
        color:"#f1f5f9", padding:"13px 14px", fontSize:15, width:"100%",
        outline:"none", fontFamily:"inherit", boxSizing:"border-box"
      };

      const handleSave = () => {
        if (!valorNum) return;
        if (isEdit) {
          if (isRecurring) { setShowSaveOpts(true); return; }
          onEdit(lancamentoEdit, "todos", { tipo, descricao, categoria, valorParcela: valorNum, diaPrimeiro: diaLanc }, mesSel);
          onClose();
        } else {
          onConfirm({ tipo, descricao, categoria, contaFixa, valorTotal: valorNum, valorParcela: valorParc, parcelas: contaFixa ? 1 : parcelas, mesPrimeiro: mesLanc, diaPrimeiro: diaLanc });
        }
      };

      const handleEditSave = (escopo) => {
        onEdit(lancamentoEdit, escopo, { tipo, descricao, categoria, valorParcela: valorNum, diaPrimeiro: diaLanc }, mesSel);
        onClose();
      };

      return (
        <BottomSheet onClose={onClose}>
          <div style={{ padding:"8px 20px 0", position:"relative" }}>

            {/* Cabeçalho */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
              <div>
                <h2 style={{ margin:0, fontSize:17, fontWeight:700, color:"#f1f5f9" }}>
                  {isEdit ? "Editar Lançamento" : "Novo Lançamento"}
                </h2>
              </div>
              <div style={{ display:"flex", gap:8 }}>
                {isEdit && (
                  <button onClick={() => { onDelete(lancamentoEdit.id); onClose(); }} style={{ background:"#7f1d1d22", border:"1px solid #7f1d1d", color:"#f87171", fontSize:13, cursor:"pointer", padding:"6px 12px", borderRadius:10, fontWeight:700 }}>
                    🗑️
                  </button>
                )}
                <button onClick={onClose} style={{ background:"#0d1b2e", border:"none", color:"#64748b", fontSize:18, cursor:"pointer", width:36, height:36, borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
              </div>
            </div>

            {/* Tipo */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
              {[["entrada","⬆️ Entrada","#16a34a"],["saida","⬇️ Saída","#dc2626"]].map(([t,label,c]) => (
                <button key={t} onClick={() => setTipo(t)} style={{
                  padding:"13px", borderRadius:14,
                  border:`2px solid ${tipo===t ? c : "transparent"}`,
                  cursor:"pointer", fontWeight:700, fontSize:14,
                  background: tipo===t ? c+"22" : "#0d1b2e",
                  color: tipo===t ? (t==="entrada" ? "#4ade80" : "#f87171") : "#475569",
                  transition:"all 0.2s"
                }}>{label}</button>
              ))}
            </div>

            {/* Data de pagamento */}
            <div style={{ display:"grid", gridTemplateColumns: isEdit ? "1fr" : "1fr 1fr", gap:10, marginBottom:14 }}>
              <div>
                <label style={{ fontSize:11, color:"#475569", display:"block", marginBottom:6, letterSpacing:1 }}>DIA DO PAGAMENTO</label>
                <div style={{ display:"flex", alignItems:"center", background:"#0d1b2e", border:"1px solid #1e3a5f", borderRadius:12, overflow:"hidden" }}>
                  <button onClick={() => setDiaLanc(d => Math.max(1, d - 1))} style={{ padding:"12px 16px", background:"transparent", border:"none", color:"#60a5fa", fontSize:18, cursor:"pointer", fontWeight:700, lineHeight:1 }}>−</button>
                  <span style={{ flex:1, textAlign:"center", color:"#f1f5f9", fontWeight:800, fontSize:17 }}>{diaLanc}</span>
                  <button onClick={() => setDiaLanc(d => Math.min(DIAS_MES[mesLanc], d + 1))} style={{ padding:"12px 16px", background:"transparent", border:"none", color:"#60a5fa", fontSize:18, cursor:"pointer", fontWeight:700, lineHeight:1 }}>+</button>
                </div>
              </div>
              {!isEdit && (
                <div>
                  <label style={{ fontSize:11, color:"#475569", display:"block", marginBottom:6, letterSpacing:1 }}>MÊS</label>
                  <div style={{ position:"relative" }}>
                    <select value={mesLanc} onChange={e => { const m = +e.target.value; setMesLanc(m); setDiaLanc(d => Math.min(d, DIAS_MES[m])); }} style={{ background:"#0d1b2e", border:"1px solid #1e3a5f", borderRadius:12, color:"#f1f5f9", padding:"13px 44px 13px 14px", fontSize:15, width:"100%", outline:"none", fontFamily:"inherit", boxSizing:"border-box", cursor:"pointer", appearance:"none", WebkitAppearance:"none" }}>
                      {MESES.map((m, i) => <option key={i} value={i}>{m}</option>)}
                    </select>
                    <span style={{ position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", color:"#60a5fa", fontSize:13, pointerEvents:"none" }}>▾</span>
                  </div>
                </div>
              )}
            </div>

            {/* Conta fixa — só na criação */}
            {!isEdit && (
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:"#0d1b2e", borderRadius:12, padding:"12px 14px", marginBottom:14 }}>
                <div>
                  <div style={{ fontSize:13, fontWeight:700, color:"#e2e8f0" }}>🔁 Conta fixa</div>
                  <div style={{ fontSize:11, color:"#475569", marginTop:2 }}>Repete automaticamente todo mês</div>
                </div>
                <div onClick={() => setContaFixa(v => !v)} style={{
                  width:44, height:24, borderRadius:12, cursor:"pointer",
                  background: contaFixa ? "#3b82f6" : "#1e3a5f",
                  position:"relative", transition:"background 0.2s", flexShrink:0
                }}>
                  <div style={{ position:"absolute", top:3, left: contaFixa ? 23 : 3, width:18, height:18, borderRadius:9, background:"#fff", transition:"left 0.2s" }} />
                </div>
              </div>
            )}

            {/* Categoria */}
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:11, color:"#475569", display:"block", marginBottom:8, letterSpacing:1 }}>CATEGORIA</label>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
                {todasCategorias.map(c => (
                  <button key={c.id} onClick={() => setCategoria(c.id)} style={{
                    padding:"6px 10px", borderRadius:20, cursor:"pointer",
                    fontSize:12, fontWeight:700,
                    background: categoria===c.id ? "#3b82f622" : "#0d1b2e",
                    color: categoria===c.id ? "#60a5fa" : "#475569",
                    border:`1px solid ${categoria===c.id ? "#3b82f6" : "transparent"}`,
                    transition:"all 0.15s"
                  }}>{c.emoji} {c.label}</button>
                ))}
                <button onClick={() => setAddingCat(v => !v)} style={{
                  padding:"6px 10px", borderRadius:20, cursor:"pointer",
                  fontSize:14, fontWeight:700, lineHeight:1,
                  background: addingCat ? "#3b82f622" : "#0d1b2e",
                  color: addingCat ? "#60a5fa" : "#475569",
                  border:`1px solid ${addingCat ? "#3b82f6" : "#1e3a5f"}`,
                  transition:"all 0.15s"
                }}>+</button>
              </div>
              {addingCat && (
                <div style={{ display:"flex", gap:8, marginTop:10, alignItems:"center" }}>
                  <input
                    type="text" placeholder="😀" value={newCatEmoji} maxLength={2}
                    onChange={e => setNewCatEmoji(e.target.value)}
                    style={{ background:"#0d1b2e", border:"1px solid #1e3a5f", borderRadius:10, color:"#f1f5f9", padding:"10px", fontSize:18, width:52, textAlign:"center", outline:"none", fontFamily:"inherit", boxSizing:"border-box" }}
                  />
                  <input
                    type="text" placeholder="Nome da categoria" value={newCatLabel}
                    onChange={e => setNewCatLabel(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && confirmarNovaCategoria()}
                    style={{ background:"#0d1b2e", border:"1px solid #1e3a5f", borderRadius:10, color:"#f1f5f9", padding:"10px 12px", fontSize:13, flex:1, outline:"none", fontFamily:"inherit", boxSizing:"border-box" }}
                  />
                  <button onClick={confirmarNovaCategoria} style={{ padding:"10px 14px", borderRadius:10, border:"none", background:"#3b82f6", color:"#fff", cursor:"pointer", fontWeight:700, fontSize:13, flexShrink:0 }}>✓</button>
                  <button onClick={() => { setAddingCat(false); setNewCatEmoji(""); setNewCatLabel(""); }} style={{ padding:"10px", borderRadius:10, border:"none", background:"#0d1b2e", color:"#475569", cursor:"pointer", fontSize:13 }}>✕</button>
                </div>
              )}
            </div>

            {/* Descrição */}
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:11, color:"#475569", display:"block", marginBottom:6, letterSpacing:1 }}>DESCRIÇÃO</label>
              <input type="text" placeholder="Ex: Salário, Aluguel, Mercado…" value={descricao}
                onChange={e => setDescricao(e.target.value)} style={inp} />
            </div>

            {/* Valor */}
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:11, color:"#475569", display:"block", marginBottom:6, letterSpacing:1 }}>
                {contaFixa || isEdit ? "VALOR MENSAL (R$)" : "VALOR TOTAL (R$)"}
              </label>
              <input type="number" min="0" step="0.01" placeholder="0,00" value={valor}
                onChange={e => setValor(e.target.value)}
                style={{ ...inp, fontSize:22, fontWeight:800, color: tipo==="entrada" ? "#4ade80" : "#f87171" }} />
            </div>

            {/* Parcelas — só na criação e não sendo conta fixa */}
            {!isEdit && !contaFixa && (
              <div style={{ marginBottom:18 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                  <label style={{ fontSize:11, color:"#475569", letterSpacing:1 }}>PARCELAS</label>
                  <span style={{ fontSize:13, fontWeight:700, color:"#3b82f6" }}>
                    {parcelas}x {valorNum > 0 && parcelas > 1 ? `· ${fmt(valorParc)}/mês` : ""}
                  </span>
                </div>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                  {[1,2,3,4,5,6,8,10,12,18,24].map(n => (
                    <button key={n} onClick={() => setParcelas(n)} style={{
                      padding:"7px 12px", borderRadius:20, border:"none", cursor:"pointer",
                      fontSize:13, fontWeight:700,
                      background: parcelas===n ? "#3b82f6" : "#0d1b2e",
                      color: parcelas===n ? "#fff" : "#475569",
                      transition:"all 0.15s"
                    }}>{n}x</button>
                  ))}
                </div>
                {parcelas > 1 && valorNum > 0 && (
                  <div style={{ marginTop:14, background:"#0d1b2e", borderRadius:14, overflow:"hidden" }}>
                    <div style={{ padding:"10px 14px", borderBottom:"1px solid #1e3a5f" }}>
                      <span style={{ fontSize:11, color:"#475569", letterSpacing:1 }}>PRÉVIA</span>
                    </div>
                    <div style={{ maxHeight:150, overflowY:"auto" }}>
                      {Array.from({ length: parcelas }, (_, i) => {
                        const m = (mes + i) % 12;
                        return (
                          <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"9px 14px", borderBottom: i < parcelas-1 ? "1px solid #0f172a" : "none" }}>
                            <span style={{ fontSize:13, color:"#64748b" }}>
                              <span style={{ color:"#3b82f6", fontWeight:700 }}>{i+1}/{parcelas}</span>
                              {" · "}{MESES[m]}
                            </span>
                            <span style={{ fontSize:13, fontWeight:700, fontFamily:"monospace", color: tipo==="entrada" ? "#4ade80" : "#f87171" }}>
                              {fmt(valorParc)}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Botão salvar */}
            <button onClick={handleSave} style={{
              width:"100%", padding:"15px", borderRadius:16, border:"none",
              background: tipo==="entrada" ? "linear-gradient(135deg,#16a34a,#4ade80)" : "linear-gradient(135deg,#dc2626,#f87171)",
              color:"#fff", cursor:"pointer", fontWeight:800, fontSize:16,
              opacity: valorNum ? 1 : 0.4, transition:"opacity 0.2s", marginBottom:8
            }}>
              {isEdit
                ? "Salvar alterações"
                : contaFixa
                  ? `Lançar conta fixa · ${fmt(valorNum)}/mês`
                  : parcelas === 1
                    ? `Lançar ${fmt(valorNum)}`
                    : `Lançar ${parcelas}x de ${fmt(valorParc)}`}
            </button>

            {/* Overlay opções de salvamento (edição recorrente) */}
            {showSaveOpts && (
              <div style={{ position:"absolute", inset:0, background:"rgba(10,18,38,0.97)", borderRadius:24, display:"flex", flexDirection:"column", justifyContent:"center", padding:"28px 20px", gap:10 }}>
                <div style={{ fontSize:15, fontWeight:700, color:"#f1f5f9", marginBottom:6 }}>Salvar alteração em:</div>
                {[
                  ["este",   "📅 Apenas este mês",    `Altera somente ${MESES[mesSel]}`],
                  ["todos",  "♾️ Todos os meses",      "Atualiza em todos os meses"],
                  ["partir", "⏩ A partir deste mês",  `Atualiza de ${MESES[mesSel]} em diante`],
                ].map(([escopo, label, desc]) => (
                  <button key={escopo} onClick={() => handleEditSave(escopo)} style={{
                    padding:"14px 16px", borderRadius:14, border:"1px solid #1e3a5f",
                    background:"#0d1b2e", color:"#f1f5f9", cursor:"pointer", textAlign:"left"
                  }}>
                    <div style={{ fontSize:14, fontWeight:700 }}>{label}</div>
                    <div style={{ fontSize:11, color:"#475569", marginTop:3 }}>{desc}</div>
                  </button>
                ))}
                <button onClick={() => setShowSaveOpts(false)} style={{ padding:"10px", borderRadius:10, border:"none", background:"transparent", color:"#475569", cursor:"pointer", fontSize:13, fontWeight:700 }}>
                  Cancelar
                </button>
              </div>
            )}
          </div>
        </BottomSheet>
      );
    }

    function TelaHome({ mesSel, setMesSel, resAnual, resMes, setModal, setEditItem, categoriasCustom }) {
      const termometro = getStatus(resMes.performance);
      const hoje = new Date().getDate();
      const todasCategorias = [...CATEGORIAS, ...categoriasCustom];
      const getEmoji = (id) => todasCategorias.find(c => c.id === id)?.emoji || "📌";
      return (
        <div style={{ flex:1, overflowY:"auto", paddingBottom:90 }}>
          {/* Hero */}
          <div style={{ margin:"16px 16px 0", background:"linear-gradient(145deg,#1a2f52,#0d1b2e)", borderRadius:24, padding:"20px 20px 16px", border:`1px solid ${termometro.cor}33`, position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:-40, right:-40, width:120, height:120, borderRadius:"50%", background:termometro.cor, opacity:0.08, filter:"blur(30px)" }} />
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:11, color:"#475569", letterSpacing:1, marginBottom:4 }}>PERFORMANCE — {MESES[mesSel].toUpperCase()}</div>
                <div style={{ fontSize:32, fontWeight:900, color:termometro.cor, lineHeight:1 }}>{fmtShort(resMes.performance)}</div>
                <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:8 }}>
                  <span style={{ fontSize:18 }}>{termometro.emoji}</span>
                  <span style={{ fontSize:14, fontWeight:700, color:termometro.cor }}>{termometro.label}</span>
                  <span style={{ fontSize:11, color:"#475569" }}>· {termometro.msg}</span>
                </div>
              </div>
              <Thermo nivel={termometro.nivel} cor={termometro.cor} size={60} />
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginTop:16 }}>
              <div style={{ background:"#ffffff0a", borderRadius:12, padding:"10px 12px" }}>
                <div style={{ fontSize:10, color:"#475569", marginBottom:2 }}>⬆️ ENTRADAS</div>
                <div style={{ fontSize:16, fontWeight:700, color:"#4ade80", fontFamily:"monospace" }}>{fmtShort(resMes.totalEntradas)}</div>
              </div>
              <div style={{ background:"#ffffff0a", borderRadius:12, padding:"10px 12px" }}>
                <div style={{ fontSize:10, color:"#475569", marginBottom:2 }}>⬇️ SAÍDAS</div>
                <div style={{ fontSize:16, fontWeight:700, color:"#f87171", fontFamily:"monospace" }}>{fmtShort(resMes.totalSaidas)}</div>
              </div>
            </div>
          </div>

          {/* Seletor mês */}
          <div style={{ overflowX:"auto", display:"flex", gap:8, padding:"16px 16px 4px" }}>
            {MESES.map((_, i) => {
              const r = resAnual[i];
              const ativo = mesSel === i;
              const tem = r.totalEntradas > 0 || r.totalSaidas > 0;
              const s = getStatus(r.performance);
              return (
                <button key={i} onClick={() => setMesSel(i)} style={{
                  flexShrink:0, padding:"8px 14px", borderRadius:20, cursor:"pointer",
                  background: ativo ? "#3b82f6" : tem ? "#1a2540" : "#0d1b2e",
                  color: ativo ? "#fff" : tem ? s.cor : "#334155",
                  fontWeight:700, fontSize:13, transition:"all 0.2s",
                  border: ativo ? "2px solid #60a5fa" : "2px solid transparent",
                  position:"relative"
                }}>
                  {MESES_SHORT[i]}
                  {tem && !ativo && <span style={{ position:"absolute", top:3, right:4, width:5, height:5, borderRadius:"50%", background:s.cor }} />}
                </button>
              );
            })}
          </div>

          {/* Lançamentos */}
          <div style={{ padding:"12px 16px 0" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <span style={{ fontSize:13, fontWeight:700, color:"#94a3b8" }}>Lançamentos · {MESES[mesSel]}</span>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={() => setModal({ mes:mesSel, dia:hoje, tipo:"entrada" })} style={{ padding:"7px 12px", borderRadius:10, border:"none", cursor:"pointer", background:"#16a34a22", color:"#4ade80", fontWeight:700, fontSize:12 }}>⬆️ Entrada</button>
                <button onClick={() => setModal({ mes:mesSel, dia:hoje, tipo:"saida" })} style={{ padding:"7px 12px", borderRadius:10, border:"none", cursor:"pointer", background:"#dc262622", color:"#f87171", fontWeight:700, fontSize:12 }}>⬇️ Saída</button>
              </div>
            </div>

            {resMes.linhas.filter(l => l.itens.length > 0).length === 0 ? (
              <div style={{ textAlign:"center", padding:"40px 20px", color:"#334155" }}>
                <div style={{ fontSize:40, marginBottom:12 }}>📭</div>
                <div style={{ fontSize:14, fontWeight:600 }}>Nenhum lançamento em {MESES[mesSel]}</div>
                <div style={{ fontSize:12, marginTop:4 }}>Toque em Entrada ou Saída para começar</div>
              </div>
            ) : (
              resMes.linhas.filter(l => l.itens.length > 0).map(({ dia, entrada, saida, saldo, itens }) => (
                <div key={dia} style={{ background:"#1a2540", borderRadius:16, marginBottom:10, overflow:"hidden" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 14px", background:"#1e2f4a", borderBottom:"1px solid #0d1b2e" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ background:"#3b82f622", borderRadius:8, padding:"3px 8px", fontSize:12, fontWeight:800, color:"#60a5fa" }}>{dia}</div>
                      <span style={{ fontSize:11, color:"#475569" }}>{MESES[mesSel]}</span>
                    </div>
                    <div style={{ display:"flex", gap:12 }}>
                      {entrada > 0 && <span style={{ fontSize:12, color:"#4ade80", fontFamily:"monospace", fontWeight:700 }}>+{fmtShort(entrada)}</span>}
                      {saida > 0 && <span style={{ fontSize:12, color:"#f87171", fontFamily:"monospace", fontWeight:700 }}>-{fmtShort(saida)}</span>}
                    </div>
                  </div>
                  {itens.map((item, idx) => (
                    <div key={idx} onClick={() => setEditItem(item)} style={{
                      display:"flex", justifyContent:"space-between", alignItems:"center",
                      padding:"11px 14px", cursor:"pointer",
                      borderBottom: idx < itens.length-1 ? "1px solid #0d1b2e" : "none"
                    }}>
                      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                        <div style={{ width:32, height:32, borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", background: item.tipo==="entrada" ? "#16a34a22" : "#dc262622", fontSize:16 }}>
                          {getEmoji(item.categoria)}
                        </div>
                        <div>
                          <div style={{ fontSize:13, fontWeight:600, color:"#e2e8f0" }}>{item.descricao || "(sem descrição)"}</div>
                          <div style={{ fontSize:11, color:"#475569", marginTop:1 }}>
                            {item.contaFixa ? "🔁 Fixa" : item.parcelas > 1 ? `Parcela ${item.parcela}/${item.parcelas}` : ""}
                          </div>
                        </div>
                      </div>
                      <div style={{ fontSize:14, fontWeight:700, fontFamily:"monospace", color: item.tipo==="entrada" ? "#4ade80" : "#f87171" }}>
                        {item.tipo==="entrada" ? "+" : "-"}{fmt(item.valorParcela)}
                      </div>
                    </div>
                  ))}
                  <div style={{ padding:"8px 14px", background:"#0d1b2e22", display:"flex", justifyContent:"flex-end" }}>
                    <span style={{ fontSize:11, color:"#475569" }}>Saldo acum.: </span>
                    <span style={{ fontSize:11, fontWeight:700, fontFamily:"monospace", color: saldo >= 0 ? "#60a5fa" : "#f87171", marginLeft:4 }}>{fmt(saldo)}</span>
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    function TelaAnual({ resAnual, setMesSel, setTab }) {
      const totalPerf = resAnual.reduce((a,m) => a + m.performance, 0);
      const totalE    = resAnual.reduce((a,m) => a + m.totalEntradas, 0);
      const totalS    = resAnual.reduce((a,m) => a + m.totalSaidas, 0);
      const s = getStatus(totalPerf);
      return (
        <div style={{ flex:1, overflowY:"auto", paddingBottom:90 }}>
          <div style={{ margin:"16px 16px 0", background:"linear-gradient(145deg,#1a2f52,#0d1b2e)", borderRadius:24, padding:"20px", border:`1px solid ${s.cor}33` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontSize:11, color:"#475569", letterSpacing:1, marginBottom:4 }}>PERFORMANCE ANUAL</div>
                <div style={{ fontSize:30, fontWeight:900, color:s.cor }}>{fmtShort(totalPerf)}</div>
                <div style={{ fontSize:13, fontWeight:600, color:s.cor, marginTop:4 }}>{s.emoji} {s.label} · {s.msg}</div>
              </div>
              <Thermo nivel={s.nivel} cor={s.cor} size={55} />
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginTop:16 }}>
              <div style={{ background:"#ffffff0a", borderRadius:12, padding:"10px 12px" }}>
                <div style={{ fontSize:10, color:"#475569", marginBottom:2 }}>⬆️ ENTRADAS</div>
                <div style={{ fontSize:15, fontWeight:700, color:"#4ade80", fontFamily:"monospace" }}>{fmtShort(totalE)}</div>
              </div>
              <div style={{ background:"#ffffff0a", borderRadius:12, padding:"10px 12px" }}>
                <div style={{ fontSize:10, color:"#475569", marginBottom:2 }}>⬇️ SAÍDAS</div>
                <div style={{ fontSize:15, fontWeight:700, color:"#f87171", fontFamily:"monospace" }}>{fmtShort(totalS)}</div>
              </div>
            </div>
          </div>
          <div style={{ padding:"16px 16px 0" }}>
            <div style={{ fontSize:12, fontWeight:700, color:"#475569", letterSpacing:1, marginBottom:12 }}>MESES</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
              {resAnual.map(({ mes, totalEntradas, totalSaidas, performance }) => {
                const t = getStatus(performance);
                const tem = totalEntradas > 0 || totalSaidas > 0;
                return (
                  <div key={mes} onClick={() => { setMesSel(mes); setTab("home"); }} style={{
                    background: tem ? "#1a2540" : "#0d1b2e", borderRadius:16, padding:"14px 12px",
                    border:`1px solid ${tem ? t.cor+"33" : "#1e3a5f22"}`,
                    cursor:"pointer", opacity: tem ? 1 : 0.5
                  }}>
                    <div style={{ fontSize:11, fontWeight:700, color:"#64748b", marginBottom:6 }}>{MESES_SHORT[mes].toUpperCase()}</div>
                    {tem ? (
                      <>
                        <div style={{ fontSize:15, fontWeight:800, color:t.cor }}>{fmtShort(performance)}</div>
                        <div style={{ fontSize:10, color:t.cor, marginTop:2 }}>{t.emoji} {t.label}</div>
                        <div style={{ display:"flex", gap:2, marginTop:8, alignItems:"flex-end", height:20 }}>
                          {(() => {
                            const max = Math.max(totalEntradas, totalSaidas, 1);
                            return <>
                              <div style={{ flex:1, height:Math.max(2,(totalEntradas/max)*18), background:"#22c55e44", borderRadius:2 }} />
                              <div style={{ flex:1, height:Math.max(2,(totalSaidas/max)*18), background:"#ef444444", borderRadius:2 }} />
                            </>;
                          })()}
                        </div>
                      </>
                    ) : (
                      <div style={{ fontSize:10, color:"#334155", marginTop:4 }}>Sem dados</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const anoAtual = new Date().getFullYear();
      const mesAtual = new Date().getMonth();

      const [lancamentos, setLancamentos]         = useState([]);
      const [mesSel, setMesSel]                   = useState(mesAtual);
      const [tab, setTab]                         = useState("home");
      const [modal, setModal]                     = useState(null);
      const [editItem, setEditItem]               = useState(null);
      const [categoriasCustom, setCategoriasCustom] = useState([]);

      const confirmarLancamento = (dados) => {
        setLancamentos(prev => [...prev, { id: Date.now(), excecoes: {}, ...dados }]);
        setModal(null);
      };

      const editarLancamento = (lancEdit, escopo, dados, mes) => {
        setLancamentos(prev => {
          const l = prev.find(x => x.id === lancEdit.id);
          if (!l) return prev;

          if (escopo === "todos") {
            return prev.map(x => x.id === l.id
              ? { ...x, tipo: dados.tipo, descricao: dados.descricao, categoria: dados.categoria, valorParcela: dados.valorParcela, diaPrimeiro: dados.diaPrimeiro ?? x.diaPrimeiro, excecoes: {} }
              : x
            );
          }

          if (escopo === "este") {
            return prev.map(x => x.id === l.id
              ? { ...x, excecoes: { ...x.excecoes, [mes]: dados } }
              : x
            );
          }

          if (escopo === "partir") {
            if (l.contaFixa) {
              const atualizado = prev.map(x => x.id === l.id ? { ...x, mesUltimo: mes - 1 } : x)
                                     .filter(x => !(x.id === l.id && x.mesUltimo < (x.mesPrimeiro || 0)));
              return [...atualizado, { id: Date.now(), ...dados, contaFixa: true, parcelas: 1, mesPrimeiro: mes, mesUltimo: undefined, diaPrimeiro: dados.diaPrimeiro ?? l.diaPrimeiro, excecoes: {} }];
            } else {
              const parcelaIdx  = (lancEdit.parcela || 1) - 1;
              const restantes   = parcelaIdx;
              const novas       = l.parcelas - parcelaIdx;
              const atualizado  = prev
                .map(x => x.id === l.id ? (restantes === 0 ? null : { ...x, parcelas: restantes }) : x)
                .filter(x => x !== null);
              return [...atualizado, { id: Date.now(), ...dados, contaFixa: false, parcelas: novas, mesPrimeiro: mes, diaPrimeiro: dados.diaPrimeiro ?? l.diaPrimeiro, excecoes: {} }];
            }
          }

          return prev;
        });
        setEditItem(null);
      };

      const deletarLancamento = (id) => {
        setLancamentos(prev => prev.filter(l => l.id !== id));
        setEditItem(null);
      };

      const calcMes = (m) => {
        const mapa = {};
        for (let d = 1; d <= DIAS_MES[m]; d++) mapa[d] = { entrada:0, saida:0, itens:[] };

        lancamentos.forEach(l => {
          const from = l.mesPrimeiro ?? 0;

          if (l.contaFixa) {
            if (m < from) return;
            if (l.mesUltimo !== undefined && m > l.mesUltimo) return;
            const exc  = l.excecoes?.[m] || {};
            const tipo = exc.tipo || l.tipo;
            const vp   = exc.valorParcela !== undefined ? exc.valorParcela : l.valorParcela;
            const desc = exc.descricao   !== undefined ? exc.descricao   : l.descricao;
            const cat  = exc.categoria  || l.categoria;
            const dia  = Math.min(l.diaPrimeiro, DIAS_MES[m]);
            if (tipo === "entrada") mapa[dia].entrada += vp; else mapa[dia].saida += vp;
            mapa[dia].itens.push({ id:l.id, descricao:desc, tipo, valorParcela:vp, categoria:cat, contaFixa:true, parcela:null, parcelas:null });
          } else {
            for (let p = 0; p < l.parcelas; p++) {
              if ((l.mesPrimeiro + p) % 12 === m) {
                const exc  = l.excecoes?.[m] || {};
                const tipo = exc.tipo || l.tipo;
                const vp   = exc.valorParcela !== undefined ? exc.valorParcela : l.valorParcela;
                const desc = exc.descricao   !== undefined ? exc.descricao   : l.descricao;
                const cat  = exc.categoria  || l.categoria;
                const dia  = Math.min(l.diaPrimeiro, DIAS_MES[m]);
                if (tipo === "entrada") mapa[dia].entrada += vp; else mapa[dia].saida += vp;
                mapa[dia].itens.push({ id:l.id, descricao:desc, tipo, valorParcela:vp, categoria:cat, contaFixa:false, parcela:p+1, parcelas:l.parcelas });
              }
            }
          }
        });

        let totalEntradas=0, totalSaidas=0, saldoAcum=0;
        const linhas = [];
        for (let d = 1; d <= DIAS_MES[m]; d++) {
          const { entrada, saida, itens } = mapa[d];
          saldoAcum += entrada - saida;
          totalEntradas += entrada; totalSaidas += saida;
          linhas.push({ dia:d, entrada, saida, saldo:saldoAcum, itens });
        }
        return { totalEntradas, totalSaidas, performance:totalEntradas-totalSaidas, linhas };
      };

      const resMes   = useMemo(() => calcMes(mesSel), [lancamentos, mesSel]);
      const resAnual = useMemo(() => MESES.map((_, i) => ({ mes:i, ...calcMes(i) })), [lancamentos]);

      // Monta objeto completo para edição (valores possivelmente sobrepostos pelo item da lista)
      const lancOriginal = editItem ? lancamentos.find(l => l.id === editItem.id) : null;
      const lancEditFull = lancOriginal
        ? { ...lancOriginal, tipo: editItem.tipo, descricao: editItem.descricao, categoria: editItem.categoria, valorParcela: editItem.valorParcela, parcela: editItem.parcela }
        : null;

      return (
        <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:"#060d1a", color:"#e2e8f0", fontFamily:"'Inter', system-ui, sans-serif" }}>

          {/* Header */}
          <div style={{ padding:"14px 20px 12px", background:"#0d1b2e", flexShrink:0, borderBottom:"1px solid #1a2540" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, maxWidth:600, margin:"0 auto" }}>
              <span style={{ fontSize:22 }}>🌡️</span>
              <div>
                <div style={{ fontSize:16, fontWeight:800, color:"#f1f5f9", lineHeight:1 }}>Termômetro</div>
                <div style={{ fontSize:11, color:"#475569" }}>Financeiro · {anoAtual}</div>
              </div>
            </div>
          </div>

          {/* Conteúdo */}
          <div style={{ flex:1, overflowY:"auto", display:"flex", flexDirection:"column" }}>
            <div style={{ maxWidth:600, width:"100%", margin:"0 auto", flex:1, display:"flex", flexDirection:"column" }}>
              {tab === "home" && <TelaHome mesSel={mesSel} setMesSel={setMesSel} resAnual={resAnual} resMes={resMes} setModal={setModal} setEditItem={setEditItem} categoriasCustom={categoriasCustom} />}
              {tab === "anual" && <TelaAnual resAnual={resAnual} setMesSel={setMesSel} setTab={setTab} />}
            </div>
          </div>

          {/* Bottom Nav */}
          <div style={{ background:"#0d1b2e", borderTop:"1px solid #1a2540", position:"fixed", bottom:0, left:0, right:0, zIndex:100 }}>
            <div style={{ display:"flex", alignItems:"center", maxWidth:600, margin:"0 auto", paddingBottom:4 }}>
              <button onClick={() => setTab("home")} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3, background:"none", border:"none", cursor:"pointer", padding:"8px 0" }}>
                <span style={{ fontSize:20 }}>🏠</span>
                <span style={{ fontSize:10, fontWeight:700, color: tab==="home" ? "#3b82f6" : "#334155" }}>Início</span>
                {tab==="home" && <div style={{ width:20, height:2, borderRadius:1, background:"#3b82f6" }} />}
              </button>

              <div style={{ flex:1, display:"flex", justifyContent:"center", alignItems:"center" }}>
                <button onClick={() => setModal({ mes:mesSel, dia:new Date().getDate(), tipo:"saida" })} style={{
                  width:54, height:54, borderRadius:27, border:"none", cursor:"pointer",
                  background:"linear-gradient(135deg,#3b82f6,#60a5fa)",
                  boxShadow:"0 4px 20px rgba(59,130,246,0.55)",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:28, color:"#fff", fontWeight:300, marginTop:-18
                }}>+</button>
              </div>

              <button onClick={() => setTab("anual")} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3, background:"none", border:"none", cursor:"pointer", padding:"8px 0" }}>
                <span style={{ fontSize:20 }}>📊</span>
                <span style={{ fontSize:10, fontWeight:700, color: tab==="anual" ? "#3b82f6" : "#334155" }}>Anual</span>
                {tab==="anual" && <div style={{ width:20, height:2, borderRadius:1, background:"#3b82f6" }} />}
              </button>
            </div>
          </div>

          {/* Modais */}
          {modal && (
            <ModalLancamento
              info={modal}
              lancamentoEdit={null}
              mesSel={mesSel}
              categoriasCustom={categoriasCustom}
              onAddCategoria={(c) => setCategoriasCustom(prev => [...prev, c])}
              onConfirm={confirmarLancamento}
              onEdit={editarLancamento}
              onDelete={deletarLancamento}
              onClose={() => setModal(null)}
            />
          )}
          {editItem && lancEditFull && (
            <ModalLancamento
              info={{ mes: mesSel, dia: lancOriginal.diaPrimeiro }}
              lancamentoEdit={lancEditFull}
              mesSel={mesSel}
              categoriasCustom={categoriasCustom}
              onAddCategoria={(c) => setCategoriasCustom(prev => [...prev, c])}
              onConfirm={confirmarLancamento}
              onEdit={editarLancamento}
              onDelete={deletarLancamento}
              onClose={() => setEditItem(null)}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
